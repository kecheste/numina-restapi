name: Fly Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  verify:
    name: Test and Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: numina
          POSTGRES_PASSWORD: password
          POSTGRES_DB: numina_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://numina:password@localhost:5432/numina_test
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: sk-dummy-key-for-testing

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly Secrets Configured
        run: |
          echo "Checking Fly.io secrets for num-api..."
          SECRETS=$(flyctl secrets list -a num-api | awk '{print $1}')
          
          echo "$SECRETS" | grep -q "^DATABASE_URL$" || (echo "DATABASE_URL is not set in Fly.io secrets!" && exit 1)
          echo "$SECRETS" | grep -q "^OPENAI_API_KEY$" || (echo "OPENAI_API_KEY is not set in Fly.io secrets!" && exit 1)
          
          echo "Core secrets are successfully configured in Fly.io!"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Install poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "poetry"

      - name: Install dependencies
        run: poetry install

      - name: Code Quality & Linting
        run: poetry run ruff check .

      - name: Run Tests
        run: poetry run pytest

      - name: Check DB Migrations
        run: poetry run alembic upgrade head

      - name: Startup Check API
        run: |
          poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/api/v1/health || exit 1

      - name: Startup Check Worker
        run: |
          poetry run python -m app.worker.run_worker &
          sleep 5
          ps aux | grep run_worker || exit 1

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        run: flyctl deploy -a num-api -c fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Worker
        run: flyctl deploy -a num-worker -c fly.worker.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
