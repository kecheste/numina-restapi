name: Fly Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  verify:
    name: Test and Verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Environment
        run: |
          test -n "$DATABASE_URL" || (echo "DATABASE_URL is not set" && exit 1)
          test -n "$OPENAI_API_KEY" || (echo "OPENAI_API_KEY is not set" && exit 1)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Install poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "poetry"

      - name: Install dependencies
        run: poetry install

      - name: Code Quality & Linting
        run: poetry run ruff check .

      - name: Run Tests
        run: poetry run pytest

      - name: Check DB Migrations
        run: poetry run alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Startup Check API
        run: |
          poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/api/v1/health || exit 1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Startup Check Worker
        run: |
          poetry run python -m app.worker.run_worker &
          sleep 5
          ps aux | grep run_worker || exit 1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        run: flyctl deploy -a num-api -c fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Worker
        run: flyctl deploy -a num-worker -c fly.worker.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
