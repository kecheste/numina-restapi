name: Fly Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        run: flyctl deploy -a numina-api -c fly.toml --remote-only --org personal
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Worker
        run: flyctl deploy -a numina-worker -c fly.worker.toml --remote-only --org personal
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
